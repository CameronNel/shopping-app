name: Refresh deals

# The "backend". Runs on GitHub's free tier, commits data/deals.json, and the
# app reads it straight from raw.githubusercontent.com. No server to run.
on:
  schedule:
    # 04:15 UTC daily — after the chains have rolled over their weekly folders.
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: deals
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scrape deals
        id: scrape
        run: node scripts/scrape/index.mjs

      - name: Commit updated feed
        run: |
          git config user.name  "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add data/deals.json
          if git diff --staged --quiet; then
            echo "No change in deals feed."
          else
            git commit -m "chore(deals): refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Report a total outage
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Deals scrape failed';
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deals-scraper',
            });
            const body = `The nightly deals scrape failed on ${new Date().toISOString().slice(0, 10)}.\n\n[View the run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nThe app keeps serving the last good feed, so this is not user-facing yet.`;
            if (open.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['deals-scraper'],
              });
            }
